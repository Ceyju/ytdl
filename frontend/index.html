<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>YT Downloader</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-white min-h-screen flex items-center justify-center">
  <div class="w-full max-w-md p-6 bg-gray-900 rounded-2xl shadow-xl space-y-4">
    <h1 class="text-2xl font-bold text-center text-red-500">YT Downloader</h1>

    <!-- URL Input -->
    <input id="urlInput" type="text" placeholder="Paste YouTube URL..."
      class="w-full px-4 py-2 rounded-lg bg-gray-800 border border-gray-700
             text-white placeholder-gray-500 focus:outline-none focus:border-red-500"/>

    <!-- Format Toggle -->
    <div class="flex gap-2">
      <button onclick="setFormat('mp3')" id="mp3Btn"
        class="flex-1 py-2 rounded-lg bg-red-600 font-semibold">MP3</button>
      <button onclick="setFormat('mp4')" id="mp4Btn"
        class="flex-1 py-2 rounded-lg bg-gray-700 font-semibold">MP4</button>
    </div>

    <!-- Quality Selector (MP4 only) -->
    <div id="qualityRow" class="hidden flex gap-2">
      <button onclick="setQuality('480')" id="q480Btn"
        class="flex-1 py-1.5 rounded-lg bg-gray-700 text-sm font-semibold">480p</button>
      <button onclick="setQuality('720')" id="q720Btn"
        class="flex-1 py-1.5 rounded-lg bg-red-600 text-sm font-semibold">720p</button>
      <button onclick="setQuality('1080')" id="q1080Btn"
        class="flex-1 py-1.5 rounded-lg bg-gray-700 text-sm font-semibold">1080p</button>
    </div>

    <!-- Fetch Info Button -->
    <button onclick="fetchInfo()"
      class="w-full py-2 rounded-lg bg-gray-700 hover:bg-gray-600 font-semibold">
      Fetch Info
    </button>

    <!-- Video Preview -->
    <div id="preview" class="hidden space-y-2">
      <img id="thumbnail" class="w-full rounded-lg"/>
      <p id="title" class="text-sm text-gray-300 text-center"></p>
      <p id="duration" class="text-xs text-gray-500 text-center"></p>

      <!-- Download Button -->
      <button onclick="downloadFile()"
        class="w-full py-2 rounded-lg bg-red-600 hover:bg-red-500 font-bold">
        Download
      </button>
    </div>

    <!-- Status -->
    <p id="status" class="text-sm text-center text-gray-400"></p>
  </div>
  <script src="app.js"></script>
</body>
</html>
