name: Refresh YouTube Cookies

on:
  schedule:
    - cron: "0 0 */3 * *"  # every 3 days
  workflow_dispatch:         # allow manual trigger

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Install Playwright
        run: |
          pip install playwright
          playwright install chromium
          playwright install-deps chromium

      - name: Export YouTube cookies
        id: cookies
        env:
          YT_EMAIL: ${{ secrets.YT_EMAIL }}
          YT_PASSWORD: ${{ secrets.YT_PASSWORD }}
        run: |
          python3 - <<'EOF'
          import asyncio, os, json
          from playwright.async_api import async_playwright

          async def main():
              async with async_playwright() as p:
                  browser = await p.chromium.launch(headless=True)
                  context = await browser.new_context()
                  page = await context.new_page()

                  # Log in to Google/YouTube
                  await page.goto("https://accounts.google.com/signin")
                  await page.fill('input[type="email"]', os.environ["YT_EMAIL"])
                  await page.click('#identifierNext')
                  await page.wait_for_selector('input[type="password"]', timeout=10000)
                  await page.fill('input[type="password"]', os.environ["YT_PASSWORD"])
                  await page.click('#passwordNext')
                  await page.wait_for_url("https://myaccount.google.com/**", timeout=15000)

                  # Navigate to YouTube to set cookies
                  await page.goto("https://www.youtube.com")
                  await page.wait_for_timeout(3000)

                  cookies = await context.cookies(["https://www.youtube.com"])
                  await browser.close()

                  # Convert to Netscape cookie format (cookies.txt)
                  lines = ["# Netscape HTTP Cookie File"]
                  for c in cookies:
                      lines.append(
                          f"{c['domain']}\t"
                          f"{'TRUE' if c['domain'].startswith('.') else 'FALSE'}\t"
                          f"{c['path']}\t"
                          f"{'TRUE' if c.get('secure') else 'FALSE'}\t"
                          f"{int(c.get('expires', 0))}\t"
                          f"{c['name']}\t"
                          f"{c['value']}"
                      )
                  cookie_content = "\n".join(lines)

                  with open("cookies.txt", "w") as f:
                      f.write(cookie_content)
                  print("Cookies exported successfully")

          asyncio.run(main())
          EOF

      - name: Update Render environment variable
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          COOKIES=$(cat cookies.txt)
          curl -sf -X PUT "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/env-vars" \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "[{\"key\": \"YT_COOKIES\", \"value\": $(echo "$COOKIES" | python3 -c 'import json,sys; print(json.dumps(sys.stdin.read()))')}]"

      - name: Trigger Render redeploy
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          curl -sf -X POST "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys" \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "{}"
